<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="512" y1="64" x2="512" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1d23"/>
      <stop offset="0.55" stop-color="#101216"/>
      <stop offset="1" stop-color="#0a0b0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="480" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#fbbf24" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="232" x2="0" y2="792" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#tile)"/>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#glow)"/>
  <rect x="70" y="70" width="884" height="884" rx="218" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="12"/>

  <!-- waveform glow layer -->
  <g filter="url(#soft)" opacity="0.55">
    <rect x="236" y="412" width="72" height="200" rx="36" fill="#fbbf24"/>
    <rect x="356" y="332" width="72" height="360" rx="36" fill="#fbbf24"/>
    <rect x="476" y="232" width="72" height="560" rx="36" fill="#fbbf24"/>
    <rect x="596" y="332" width="72" height="360" rx="36" fill="#fbbf24"/>
    <rect x="716" y="412" width="72" height="200" rx="36" fill="#fbbf24"/>
  </g>

  <!-- waveform -->
  <g>
    <rect x="236" y="412" width="72" height="200" rx="36" fill="url(#bar)"/>
    <rect x="356" y="332" width="72" height="360" rx="36" fill="url(#bar)"/>
    <rect x="476" y="232" width="72" height="560" rx="36" fill="url(#bar)"/>
    <rect x="596" y="332" width="72" height="360" rx="36" fill="url(#bar)"/>
    <rect x="716" y="412" width="72" height="200" rx="36" fill="url(#bar)"/>
  </g>
</svg>
