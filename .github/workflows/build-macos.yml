name: build-macos

# Builds the VoicePaste macOS app (Apple Silicon + Intel zips).
# Unsigned builds: after downloading, run `xattr -cr "/Applications/Developer beta V1.1.app"`
# (or right-click -> Open) to get past Gatekeeper.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not ci): the lockfile is maintained on Windows and npm's
        # platform-specific optional deps make strict ci fail cross-platform
        run: npm install

      - name: Typecheck & tests
        run: |
          npm run typecheck
          npm test

      - name: Build embedded engine (whisper-server, Metal)
        run: |
          # macos-14 runners are arm64; build the Metal whisper-server that the
          # app bundles + launches on-device. (Intel users fall back to the
          # first-run CUDA/CPU download path; a dedicated x64 engine build can
          # be added on an Intel runner later.)
          git clone --depth 1 --branch v1.9.1 https://github.com/ggml-org/whisper.cpp /tmp/whispercpp
          cmake -S /tmp/whispercpp -B /tmp/whispercpp/build -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_EXAMPLES=ON -DGGML_METAL_EMBED_LIBRARY=ON
          cmake --build /tmp/whispercpp/build --config Release -j --target whisper-server
          mkdir -p resources/engine/darwin-arm64 resources/engine/darwin-x64
          cp /tmp/whispercpp/build/bin/whisper-server resources/engine/darwin-arm64/
          cp /tmp/whispercpp/build/bin/whisper-server resources/engine/darwin-x64/
          chmod +x resources/engine/darwin-arm64/whisper-server resources/engine/darwin-x64/whisper-server

      - name: Bundle static ffmpeg (both arches)
        # whisper-server's --convert execs ffmpeg at startup; clean Macs don't
        # have it, so bundle a static build next to the engine binary.
        run: |
          for arch in arm64 amd64; do
            dir="resources/engine/darwin-$([ "$arch" = "amd64" ] && echo x64 || echo arm64)"
            curl -sL -o /tmp/ffmpeg-$arch.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/$arch/release/ffmpeg.zip"
            unzip -o /tmp/ffmpeg-$arch.zip -d /tmp/ffmpeg-$arch
            cp "$(find /tmp/ffmpeg-$arch -name ffmpeg -type f | head -1)" "$dir/ffmpeg"
            chmod +x "$dir/ffmpeg"
          done

      - name: Build & package (arm64 + x64)
        env:
          # No signing identity available — produce unsigned zips
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm run build
          npx electron-builder --mac zip --arm64 --x64 --publish never

      - name: List artifacts
        run: ls -la release/

      - uses: actions/upload-artifact@v4
        with:
          name: voicepaste-macos
          path: release/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck & tests
        run: |
          npm run typecheck
          npm test

      - name: Fetch engine (prebuilt whisper-server for Windows)
        # Downloads the official whisper.cpp release binaries (same pinned
        # version as the macOS build) into resources/engine/win32-x64/.
        run: npm run fetch-engine

      - name: Build & package (x64 zip + installer)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package:win

      - name: List artifacts
        run: dir release

      - uses: actions/upload-artifact@v4
        with:
          name: voicepaste-windows
          path: |
            release/*.zip
            release/*.exe
