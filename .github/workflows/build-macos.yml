name: build-macos

# Builds the VoicePaste macOS app (Apple Silicon + Intel zips).
# Unsigned builds: after downloading, run `xattr -cr "/Applications/Developer beta V1.1.app"`
# (or right-click -> Open) to get past Gatekeeper.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & tests
        run: |
          npm run typecheck
          npm test

      - name: Build & package (arm64 + x64)
        env:
          # No signing identity available — produce unsigned zips
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm run build
          npx electron-builder --mac zip --arm64 --x64

      - name: List artifacts
        run: ls -la release/

      - uses: actions/upload-artifact@v4
        with:
          name: voicepaste-macos
          path: release/*.zip
